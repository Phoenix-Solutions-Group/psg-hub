<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Confirm your PSG Advantage email change</title>
  </head>
  <body style="margin:0;padding:0;background:#FAF8F5;color:#2A2826;font-family:Arial,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#FAF8F5;margin:0;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:620px;background:#FFFFFF;border:1px solid #E4DED5;">
            <tr>
              <td style="padding:32px 32px 20px;border-bottom:1px solid #E4DED5;">
                <img src="https://data-psg-digital.vercel.app/brand/assets/psg-logo-primary-email.png" alt="Phoenix Solutions Group" width="190" style="display:block;width:190px;max-width:100%;height:auto;margin:0 0 24px;border:0;outline:none;text-decoration:none;">
                <p style="margin:0 0 10px;font-size:12px;line-height:1.4;text-transform:uppercase;color:#B8483E;font-weight:700;">Phoenix Solutions Group</p>
                <h1 style="margin:0;color:#1E3A52;font-size:28px;line-height:1.2;font-weight:400;">Confirm your email change.</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:28px 32px 32px;">
                <p style="margin:0 0 18px;font-size:16px;line-height:1.65;color:#2A2826;">A request was made to change your PSG Advantage account email.</p>
                <p style="margin:0 0 28px;font-size:15px;line-height:1.65;color:#4A4257;">Confirm the change to complete the update.</p>
                <table role="presentation" cellpadding="0" cellspacing="0">
                  <tr>
                    <td style="background:#1E3A52;border:1px solid #1E3A52;">
                      <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:13px 20px;color:#FFFFFF;text-decoration:none;font-size:14px;line-height:1.2;font-weight:700;">Confirm email change</a>
                    </td>
                  </tr>
                </table>
                <p style="margin:28px 0 0;font-size:13px;line-height:1.65;color:#9A958E;">If the button does not work, paste this link into your browser:<br><a href="{{ .ConfirmationURL }}" style="color:#B8483E;word-break:break-all;">{{ .ConfirmationURL }}</a></p>
              </td>
            </tr>
            <tr>
              <td style="padding:18px 32px;background:#F2EEE8;border-top:1px solid #E4DED5;">
                <p style="margin:0;font-size:12px;line-height:1.6;color:#4A4257;">PSG Advantage Portal</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
