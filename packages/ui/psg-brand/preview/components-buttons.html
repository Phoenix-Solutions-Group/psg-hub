<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:var(--psg-paper);font-family:var(--font-body)}
  .row{display:flex;gap:14px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  .row:last-child{margin-bottom:0}
  .lbl{width:88px;font-family:var(--font-mono);font-size:10px;color:var(--psg-mist);letter-spacing:0.04em;text-transform:uppercase}
  .btn{font-family:var(--font-display);font-size:13px;font-weight: 500;letter-spacing:0.04em;padding:12px 22px;border-radius:6px;border:1px solid transparent;cursor:pointer;transition:all 220ms cubic-bezier(0.22,0.61,0.36,1);display:inline-flex;align-items:center;gap:8px}
  .btn-primary{background:var(--psg-midnight);color:var(--psg-paper)}
  .btn-primary:hover{background:#142838}
  .btn-secondary{background:transparent;color:var(--psg-midnight);border-color:var(--psg-midnight)}
  .btn-secondary:hover{background:var(--psg-midnight);color:var(--psg-paper)}
  .btn-ghost{background:transparent;color:var(--psg-midnight);border-color:transparent;padding-left:6px;padding-right:6px}
  .btn-ghost:hover{color:var(--psg-ember)}
  .btn-accent{background:var(--psg-ember);color:#fff}
  .btn-accent:hover{background:#8C362D}
  .btn-sm{font-size:11px;padding:8px 14px}
  .btn-lg{font-size:14px;padding:14px 28px}
</style></head>
<body>
  <div class="row"><span class="lbl">Primary</span><button class="btn btn-primary">Schedule a consultation</button><button class="btn btn-secondary">Learn more</button><button class="btn btn-ghost">View case study →</button></div>
  <div class="row"><span class="lbl">Accent</span><button class="btn btn-accent">Begin transformation</button><button class="btn btn-primary btn-sm">Compact</button><button class="btn btn-primary btn-lg">Hero size</button></div>
</body></html>
