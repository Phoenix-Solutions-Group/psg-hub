<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--psg-paper);font-family:var(--font-body)}
  .grid{display:grid;grid-template-columns:1fr 2fr;gap:16px}
  .tile{background:#fff;border:1px solid var(--color-border);border-radius:6px;padding:24px;display:flex;align-items:center;justify-content:center;min-height:120px}
  .tile img{max-width:90%;max-height:80px}
  .meta{font-family:var(--font-mono);font-size:10px;color:var(--psg-mist);margin-top:8px;letter-spacing:0.04em}
</style></head>
<body>
  <div class="grid">
    <div>
      <div class="tile"><img src="../assets/psg-mark.svg" alt=""></div>
      <div class="meta">MARK · favicon, avatar</div>
    </div>
    <div>
      <div class="tile"><img src="../assets/psg-logo-horizontal.svg" alt=""></div>
      <div class="meta">HORIZONTAL · compact lockup</div>
    </div>
  </div>
</body></html>
