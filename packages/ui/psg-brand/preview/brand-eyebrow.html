<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:32px;background:var(--psg-paper);font-family:var(--font-body)}
  .eyebrow{font-family:var(--font-display);font-size:12px;font-weight: 500;text-transform:uppercase;letter-spacing:0.18em;color:var(--psg-ember);display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .eyebrow::before{content:"";width:24px;height:1px;background:currentColor}
  h2{font-family:var(--font-display);font-size:36px;font-weight:300;color:var(--psg-midnight);letter-spacing:-0.015em;margin:0 0 16px;line-height:1.1}
  p{font-size:15px;line-height:1.65;color:var(--psg-graphite);margin:0;max-width:560px}
  em{font-style:italic;color:var(--psg-slate)}
</style></head>
<body>
  <div class="eyebrow">35 Years of Transformation</div>
  <h2>Marketing built around your bay schedule.<br/>Not the other way around.</h2>
  <p>Strategic insight, operationally executed. Established 1989 — refined every quarter since. <em>Trust earned through follow-through.</em></p>
</body></html>
