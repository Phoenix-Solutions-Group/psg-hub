<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--psg-paper);font-family:var(--font-body)}
  .row{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
  .swatch{border:1px solid var(--color-border);border-radius:4px;overflow:hidden;background:#fff}
  .chip{height:64px}
  .meta{padding:8px 10px}
  .name{font-family:var(--font-display);font-size:11px;font-weight: 500;color:var(--psg-midnight)}
  .hex{font-family:var(--font-mono);font-size:10px;color:var(--psg-mist);margin-top:2px}
</style></head>
<body>
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#FAFAFA"></div><div class="meta"><div class="name">Paper</div><div class="hex">#FAFAFA</div></div></div>
    <div class="swatch"><div class="chip" style="background:#F0F0F0"></div><div class="meta"><div class="name">Bone</div><div class="hex">#F0F0F0</div></div></div>
    <div class="swatch"><div class="chip" style="background:#E0E0E0"></div><div class="meta"><div class="name">Stone</div><div class="hex">#E0E0E0</div></div></div>
    <div class="swatch"><div class="chip" style="background:#C4C4C4"></div><div class="meta"><div class="name">Fog</div><div class="hex">#C4C4C4</div></div></div>
    <div class="swatch"><div class="chip" style="background:#949494"></div><div class="meta"><div class="name">Mist</div><div class="hex">#949494</div></div></div>
    <div class="swatch"><div class="chip" style="background:#2A2A2A"></div><div class="meta"><div class="name">Graphite</div><div class="hex">#2A2A2A</div></div></div>
    <div class="swatch"><div class="chip" style="background:#161616"></div><div class="meta"><div class="name">Ink</div><div class="hex">#161616</div></div></div>
  </div>
</body></html>
