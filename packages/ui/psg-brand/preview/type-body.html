<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding: 28px 32px; background: var(--psg-paper); }
  .row { display:flex; gap: 24px; padding: 10px 0; border-bottom: 1px solid var(--color-border); align-items: baseline;}
  .row:last-child{border-bottom:none}
  .label { width: 90px; font-family: var(--font-mono); font-size: 11px; color: var(--psg-mist); flex-shrink:0; }
  .body { color: var(--psg-graphite); font-family: var(--font-body); }
  .lead-line { font-size: 20px; line-height: 1.6; }
  .body-line { font-size: 16px; line-height: 1.65; }
  .small-line { font-size: 14px; line-height: 1.55; color: var(--psg-mist); }
  .eyebrow-line { font-family: 'Gotham', var(--font-display); font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.18em; color: var(--psg-ember); }
</style></head>
<body>
  <div class="row"><span class="label">Eyebrow 12</span><span class="eyebrow-line">35 Years of Transformation</span></div>
  <div class="row"><span class="label">Lead 20</span><span class="body lead-line">Marketing built around your bay schedule.</span></div>
  <div class="row"><span class="label">Body 16</span><span class="body body-line">Strategic insight, operationally executed. Since 1989.</span></div>
  <div class="row"><span class="label">Small 14</span><span class="body small-line">We respond to inquiries within one business day.</span></div>
</body></html>
