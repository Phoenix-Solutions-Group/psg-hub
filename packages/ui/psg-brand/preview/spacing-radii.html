<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:var(--psg-paper);font-family:var(--font-body)}
  .grid{display:flex;gap:18px}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{width:84px;height:64px;background:#fff;border:1px solid var(--color-border);box-shadow:0 1px 2px rgba(22,21,20,0.04)}
  .lbl{font-family:var(--font-mono);font-size:11px;color:var(--psg-graphite)}
  .px{font-size:11px;color:var(--psg-mist)}
</style></head>
<body>
  <div class="grid">
    <div class="item"><div class="box" style="border-radius:0"></div><div class="lbl">none</div><div class="px">0</div></div>
    <div class="item"><div class="box" style="border-radius:2px"></div><div class="lbl">xs</div><div class="px">2px</div></div>
    <div class="item"><div class="box" style="border-radius:4px"></div><div class="lbl">sm</div><div class="px">4px</div></div>
    <div class="item"><div class="box" style="border-radius:6px"></div><div class="lbl">md · default</div><div class="px">6px</div></div>
    <div class="item"><div class="box" style="border-radius:10px"></div><div class="lbl">lg</div><div class="px">10px</div></div>
    <div class="item"><div class="box" style="border-radius:999px"></div><div class="lbl">pill</div><div class="px">tags only</div></div>
  </div>
</body></html>
