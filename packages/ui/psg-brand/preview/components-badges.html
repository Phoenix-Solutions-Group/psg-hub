<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:var(--psg-paper);font-family:var(--font-body)}
  .row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
  .row:last-child{margin-bottom:0}
  .lbl{width:88px;font-family:var(--font-mono);font-size:10px;color:var(--psg-mist);letter-spacing:0.04em;text-transform:uppercase}
  .badge{font-family:var(--font-display);font-size:11px;font-weight: 500;text-transform:uppercase;letter-spacing:0.1em;padding:5px 12px;border-radius:999px;display:inline-flex;align-items:center;gap:6px}
  .b-primary{background:var(--psg-midnight);color:var(--psg-paper)}
  .b-soft{background:#DCE3EA;color:#142838}
  .b-accent{background:#FAEEEC;color:#8C362D}
  .b-slate{background:#F2F0F4;color:#36303E}
  .b-success{background:#E4ECDF;color:#3A553D}
  .b-outline{background:transparent;color:var(--psg-midnight);border:1px solid var(--psg-midnight-70)}
  .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
</style></head>
<body>
  <div class="row"><span class="lbl">Solid</span>
    <span class="badge b-primary">Primary</span>
    <span class="badge b-accent">New</span>
    <span class="badge b-slate">Refined</span>
    <span class="badge b-success"><span class="dot"></span>Active client</span>
  </div>
  <div class="row"><span class="lbl">Soft</span>
    <span class="badge b-soft">Quarterly</span>
    <span class="badge b-soft">Collision</span>
    <span class="badge b-outline">Outline</span>
  </div>
</body></html>
