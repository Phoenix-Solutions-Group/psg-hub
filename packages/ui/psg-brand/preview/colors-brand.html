<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--psg-paper);font-family:var(--font-body)}
  .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px}
  .swatch{display:flex;flex-direction:column;border:1px solid var(--color-border);border-radius:6px;overflow:hidden;background:#fff}
  .chip{height:120px}
  .meta{padding:12px 14px}
  .name{font-family:var(--font-display);font-size:13px;font-weight: 500;color:var(--psg-midnight);letter-spacing:0.02em}
  .role{font-size:11px;color:var(--psg-mist);margin-top:2px}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--psg-graphite);margin-top:6px;letter-spacing:0.04em}
</style></head>
<body>
  <div class="grid">
    <div class="swatch"><div class="chip" style="background:#1E3A52"></div><div class="meta"><div class="name">Midnight</div><div class="role">Primary · trust, heritage</div><div class="hex">#1E3A52</div></div></div>
    <div class="swatch"><div class="chip" style="background:#B8483E"></div><div class="meta"><div class="name">Ember</div><div class="role">Accent · transformation</div><div class="hex">#B8483E</div></div></div>
    <div class="swatch"><div class="chip" style="background:#4B5058"></div><div class="meta"><div class="name">Dark Ash</div><div class="role">Secondary · supporting copy</div><div class="hex">#4B5058</div></div></div>
  </div>
</body></html>
