<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--psg-paper);font-family:var(--font-body)}
  .row{display:flex;align-items:center;gap:14px;padding:6px 0;border-bottom:1px solid var(--color-border)}
  .row:last-child{border-bottom:none}
  .token{width:96px;font-family:var(--font-mono);font-size:11px;color:var(--psg-graphite)}
  .px{width:48px;font-family:var(--font-mono);font-size:11px;color:var(--psg-mist);text-align:right}
  .bar{height:14px;background:var(--psg-midnight);border-radius:2px}
</style></head>
<body>
  <div class="row"><span class="token">--space-1</span><span class="px">4px</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="token">--space-2</span><span class="px">8px</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="token">--space-3</span><span class="px">12px</span><div class="bar" style="width:12px"></div></div>
  <div class="row"><span class="token">--space-4</span><span class="px">16px</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="token">--space-5</span><span class="px">24px</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="token">--space-6</span><span class="px">32px</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="token">--space-7</span><span class="px">40px</span><div class="bar" style="width:40px"></div></div>
  <div class="row"><span class="token">--space-8</span><span class="px">48px</span><div class="bar" style="width:48px"></div></div>
  <div class="row"><span class="token">--space-9</span><span class="px">64px</span><div class="bar" style="width:64px"></div></div>
  <div class="row"><span class="token">--space-10</span><span class="px">80px</span><div class="bar" style="width:80px"></div></div>
  <div class="row"><span class="token">--space-11</span><span class="px">96px</span><div class="bar" style="width:96px"></div></div>
</body></html>
