<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Phoenix Solutions Group — Marketing Site</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="icon" href="../../assets/psg-mark.svg"/>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<link rel="stylesheet" href="styles.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="CapabilityGrid.jsx"></script>
<script type="text/babel" src="Proof.jsx"></script>
<script type="text/babel" src="Testimonial.jsx"></script>
<script type="text/babel" src="CtaBanner.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel" src="ConsultModal.jsx"></script>

<script type="text/babel" data-screen-label="Marketing Site">
const App = () => {
  const [modalOpen, setModalOpen] = React.useState(false);
  const open = () => setModalOpen(true);
  return (
    <>
      <Nav onCtaClick={open} />
      <Hero onPrimary={open} onSecondary={() => document.getElementById('capabilities')?.scrollIntoView({behavior:'smooth'})} />
      <CapabilityGrid />
      <Proof />
      <Testimonial />
      <CtaBanner onClick={open} />
      <Footer />
      <ConsultModal open={modalOpen} onClose={() => setModalOpen(false)} />
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
