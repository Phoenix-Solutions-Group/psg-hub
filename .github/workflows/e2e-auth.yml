# Auth happy-path E2E (PSG-791) — the live/E2E gate that ships the B1 fix (PSG-766).
#
# Runs e2e/auth-happy-paths.spec.ts against a throwaway LOCAL Supabase stack +
# its bundled test inbox (Inbucket) on a Docker-capable GitHub-hosted runner —
# the "builder machine with Docker" the ticket calls for, which the agent
# sandboxes do not have. It actually SUBMITS the sign-up / login / reset forms
# and follows the real e-mail links, in BOTH e-mail-confirmation modes.
#
# No Lob key and no heavy fixture seed: this is isolated from the production
# happy-path suite (e2e.yml) on purpose. The auth spec seeds the one account it
# needs via the service role.
#
# Agents have no raw-log access, so the Playwright `github` reporter + explicit
# ::error:: annotations surface failures through the public check-runs API.

name: E2E Auth

on:
  push:
    branches: [main, feat/psg-766]
  workflow_dispatch:

concurrency:
  group: e2e-auth-${{ github.ref }}
  cancel-in-progress: true

jobs:
  auth-e2e:
    name: auth happy-path E2E (confirm=${{ matrix.confirm }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        confirm: ["off", "on"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser (chromium)
        run: pnpm --filter psg-hub exec playwright install --with-deps chromium

      # Toggle the e-mail-confirmation mode for this matrix leg and allow-list the
      # E2E app origin (port 3100) so GoTrue accepts our /auth/callback redirect.
      # Edits are runner-local (never committed) so blast radius is zero.
      - name: Configure local Supabase for this leg
        working-directory: apps/psg-hub
        run: |
          CONFIRM='${{ matrix.confirm }}'
          if [ "$CONFIRM" = "on" ]; then VAL=true; else VAL=false; fi
          # Scope to the [auth.email] section only — there is a second
          # enable_confirmations under [auth.sms] that must stay false.
          sed -i "/^\[auth\.email\]/,/^\[/ s/^enable_confirmations = .*/enable_confirmations = ${VAL}/" supabase/config.toml
          sed -i 's#^site_url = .*#site_url = "http://localhost:3100"#' supabase/config.toml
          sed -i 's#^additional_redirect_urls = .*#additional_redirect_urls = ["http://localhost:3100", "http://localhost:3100/**", "http://127.0.0.1:3100", "http://127.0.0.1:3100/**", "https://127.0.0.1:3000"]#' supabase/config.toml
          echo "--- effective auth config ---"
          grep -E "^(site_url|enable_confirmations|additional_redirect_urls) " supabase/config.toml || true

      # Spins up the local Supabase stack (Docker) + Inbucket and applies
      # supabase/migrations/*. Same error-annotation handling as e2e.yml.
      - name: Start local Supabase
        working-directory: apps/psg-hub
        run: |
          pnpm exec supabase start 2>&1 | tee /tmp/supabase-start.log
          SUPABASE_EXIT=${PIPESTATUS[0]}
          if [ "$SUPABASE_EXIT" -ne 0 ]; then
            echo "::error::supabase start failed (exit $SUPABASE_EXIT) — error lines:"
            grep -iE "error|fatal|failed|panic" /tmp/supabase-start.log | tail -30 | while IFS= read -r line; do
              echo "::error::  $line"
            done
            tail -20 /tmp/supabase-start.log | while IFS= read -r line; do echo "::error::  $line"; done
            exit 1
          fi

      - name: Write .env.test.local (local Supabase)
        working-directory: apps/psg-hub
        run: |
          set +e
          pnpm exec supabase status -o env > supabase-status.env 2>&1
          STATUS_EXIT=$?
          set -e
          if [ $STATUS_EXIT -ne 0 ]; then
            echo "::error::supabase status failed (exit $STATUS_EXIT):"
            cat supabase-status.env | while IFS= read -r line; do echo "::error::  $line"; done
            exit 1
          fi
          get() { grep -E "^$1=" supabase-status.env | head -1 | cut -d= -f2- | sed -e 's/^"//' -e 's/"$//'; }
          API_URL="$(get API_URL)"
          ANON_KEY="$(get ANON_KEY)"
          SERVICE_ROLE_KEY="$(get SERVICE_ROLE_KEY)"
          if [ -z "$API_URL" ] || [ -z "$ANON_KEY" ] || [ -z "$SERVICE_ROLE_KEY" ]; then
            echo "::error::Could not parse local Supabase status env. Keys: $(cut -d= -f1 supabase-status.env | tr '\n' ' ')"
            exit 1
          fi
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY"
          } > .env.test.local
          rm -f supabase-status.env
          echo "----- .env.test.local (keys only) -----"
          cut -d= -f1 .env.test.local

      - name: Run auth happy-path E2E
        env:
          E2E_CONFIRM_MODE: ${{ matrix.confirm }}
          INBUCKET_URL: http://127.0.0.1:54354
        run: pnpm --filter psg-hub exec playwright test -c playwright.auth.config.ts

      - name: Upload Playwright artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-auth-artifacts-${{ matrix.confirm }}
          path: |
            apps/psg-hub/test-results/
            apps/psg-hub/playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Stop local Supabase
        if: ${{ always() }}
        working-directory: apps/psg-hub
        run: pnpm exec supabase stop --no-backup || true
